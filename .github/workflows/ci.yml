name: syscall-testsuite

on:
  push:
    branches: [main, master, dev]
    paths:
      - 'test_program/**'
      - 'run_all_tests.sh'
      - 'scripts/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, master, dev]
    paths:
      - 'test_program/**'
      - 'run_all_tests.sh'
      - 'scripts/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

jobs:
  # =============================================
  # Phase 1: Linux 多架构测试
  # =============================================
  linux_tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        starry_arch: [riscv64, x86_64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            musl-tools \
            qemu-user \
            e2fsprogs \
            libudev-dev \
            pkg-config \
            build-essential \
            file

      - name: Install musl cross-compilers (via Zig)
        run: |
          ZIG_VERSION="0.13.0"
          ZIG_URL="https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz"
          curl -fsSL "$ZIG_URL" | sudo tar -xJ -C /opt/
          sudo ln -sf /opt/zig-linux-x86_64-${ZIG_VERSION}/zig /usr/local/bin/zig

          for target in x86_64-linux-musl riscv64-linux-musl; do
            arch="${target%%-*}"
            wrapper="/usr/local/bin/${arch}-linux-musl-gcc"
            cat > "$wrapper" <<WRAPPER
#!/bin/bash
exec zig cc -target ${target} -static "\$@"
WRAPPER
            chmod +x "$wrapper"
          done

          echo "=== Verify ==="
          x86_64-linux-musl-gcc --version 2>&1 | head -1
          riscv64-linux-musl-gcc --version 2>&1 | head -1

      - name: Verify QEMU
        run: |
          qemu-x86_64 --version | head -1
          qemu-riscv64 --version | head -1

      - name: Run Linux tests (--linux-only)
        run: |
          bash ./run_all_tests.sh --linux-only --starry-arch ${{ matrix.starry_arch }} --no-dep-check

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-logs-${{ matrix.starry_arch }}
          path: |
            logs/
            build/
          retention-days: 7

  # =============================================
  # Phase 2: StarryOS 测试
  # =============================================
  starryos_tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        starry_arch: [riscv64]
    steps:
      - name: Checkout testsuit
        uses: actions/checkout@v4

      - name: Checkout tgoskits
        uses: actions/checkout@v4
        with:
          repository: rcore-os/tgoskits
          path: tgoskits
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            musl-tools \
            qemu-user \
            qemu-system-misc \
            e2fsprogs \
            libudev-dev \
            pkg-config \
            build-essential \
            file

      - name: Install musl cross-compilers (via Zig)
        run: |
          ZIG_VERSION="0.13.0"
          ZIG_URL="https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz"
          curl -fsSL "$ZIG_URL" | sudo tar -xJ -C /opt/
          sudo ln -sf /opt/zig-linux-x86_64-${ZIG_VERSION}/zig /usr/local/bin/zig

          for target in riscv64-linux-musl; do
            arch="${target%%-*}"
            wrapper="/usr/local/bin/${arch}-linux-musl-gcc"
            cat > "$wrapper" <<WRAPPER
#!/bin/bash
exec zig cc -target ${target} -static "\$@"
WRAPPER
            chmod +x "$wrapper"
          done

          riscv64-linux-musl-gcc --version 2>&1 | head -1

      - name: Install Rust toolchain
        run: |
          rustup toolchain install nightly --profile minimal
          rustup target add \
            x86_64-unknown-none \
            riscv64gc-unknown-none-elf \
            aarch64-unknown-none-softfloat

      - name: Run StarryOS tests (--starry-only)
        run: |
          bash ./run_all_tests.sh --starry-only --starry-arch ${{ matrix.starry_arch }} \
            --tgoskits $(pwd)/tgoskits --no-dep-check
        timeout-minutes: 30

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: starryos-logs-${{ matrix.starry_arch }}
          path: |
            logs/
            build/
          retention-days: 7
